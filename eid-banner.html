<!-- eid-banner.html -->
<div class="eid-top-banner" aria-hidden="true">
  <div class="eid-poster"></div>
</div>

<style>
  .eid-top-banner {
    width: 100%;
    height: clamp(380px, 48vw, 780px);
    position: relative;
    z-index: 550;
  }

  .eid-poster {
    width: 100%;
    height: 100%;
    background-image: url('/websiteArtboard.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* Make sure nav stays readable */
  nav {
    background: rgba(23, 23, 28, 0.78) !important;
    backdrop-filter: blur(12px) !important;
  }

  [data-theme="light"] nav {
    background: rgba(234, 231, 224, 0.85) !important;
  }

  /* Very important: push content down */
  body {
    padding-top: clamp(380px, 48vw, 780px) !important;
  }
</style>
