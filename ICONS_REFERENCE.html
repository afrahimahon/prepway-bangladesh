HOW TO USE:
  Option A — Use as image file:

    2. Paste the SVG code
    3. Download as PNG
    4. Rename to the correct file name (e.g. icon-01.png)
    5. Place in the same folder as index.html

  Option B — Replace directly in index.html:
    Find:  <img src="icon-XX.png" ...>
    Replace with the <svg>...</svg> block directly
